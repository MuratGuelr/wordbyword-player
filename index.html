<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WordByWord - Realtime Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <div class="app-container">
    
    <!-- HEADER -->
    <header class="glass-header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
        </div>
        <h1>WordByWord <span class="badge">Sync</span></h1>
      </div>

      <div class="header-actions">
        <div class="auth-section" id="auth-section">
          <button id="login-btn" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in
          </button>
          <div id="user-profile" class="user-profile hidden">
            <img id="user-avatar" src="" alt="Avatar" />
            <span id="user-name"></span>
            <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      
      <!-- Upload Drawer (Host Only) -->
      <div class="upload-drawer glass-panel" id="upload-drawer">
        <div class="drawer-header">
          <h2>Host Settings <span class="subtitle">Drop files to broadcast</span></h2>
          <button id="toggle-drawer-btn" class="btn btn-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
          </button>
        </div>
        <div class="drawer-body" id="drawer-body">
          <div class="drop-zones">
            <div class="dz" id="dz-audio">
              <input type="file" id="file-audio" accept="audio/*" />
              <div class="dz-icon">🎵</div>
              <p><strong>Audio File</strong><br>MP3, WAV, M4A</p>
            </div>
            <div class="dz" id="dz-text">
              <input type="file" id="file-text" accept=".json,.srt,.vtt,.txt" />
              <div class="dz-icon">📄</div>
              <p><strong>Transcript</strong><br>JSON, SRT, VTT</p>
            </div>
          </div>
          <div class="status-indicator" id="sync-status">
            <div class="pulse-dot"></div> Waiting for files...
          </div>
        </div>
      </div>

      <!-- Transcript Area -->
      <div class="transcript-container glass-panel">
        <div class="transcript-header">
          <div class="mode-toggles">
            <button class="mode-btn active" data-mode="sentence">Lines</button>
            <button class="mode-btn" data-mode="word">Words</button>
          </div>
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="search-input" placeholder="Search transcript..." />
          </div>
        </div>

        <div class="transcript-scroll" id="transcript-scroll">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="M8 12h8M12 8v8"></path></svg>
            </div>
            <h3>Waiting for Host</h3>
            <p>Please log in and drop your files above (if you are the host), or wait for the host to start the session.</p>
          </div>
          <div id="cuelist" class="cuelist"></div>
        </div>
      </div>

    </main>

    <!-- BOTTOM PLAYER (Host audio player / Remote visualizer) -->
    <div class="player-container glass-panel">
      <div class="player-info">
        <span id="playing-filename">No audio loaded</span>
        <div class="sync-badge" id="role-badge">Remote</div>
      </div>
      
      <div class="progress-area">
        <div class="time current-time" id="time-current">00:00</div>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <div class="time duration-time" id="time-duration">--:--</div>
      </div>

      <div class="controls-area">
        <button class="btn btn-icon btn-secondary" id="btn-skip-back" title="-5s">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
        </button>
        <button class="btn btn-play" id="btn-play-pause">
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
          <svg id="icon-pause" class="hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
        </button>
        <button class="btn btn-icon btn-secondary" id="btn-skip-fwd" title="+5s">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
        </button>
      </div>
    </div>

  </div>

  <audio id="audio-player" style="display: none;"></audio>

  <!-- Load App Logic -->
  <script type="module" src="app.js"></script>
</body>
</html>
